<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/register.css">
    <title>Document</title>
</head>

<body>
    <div class="left">
        <div class="modescontiner">
            <div class="modes">
                <h1>Empowering people through seamless HR management.</h1>
                <div class="round">
                    <img src="./assets/icons/kichkinadumaloq.svg" alt="">
                </div>

                <img src="./assets/images/familyimages.png" alt="">

                <p>Efficiently manage your workforce, streamline operations effortlessly.</p>
            </div>
        </div>
        <img src="./assets/images/icon1.png" alt="">

        <div class="icon2">
            <img src="./assets/images/icon2.png" alt="">
        </div>
    </div>



    <div class="registratsiya">
        <div class="images">
            <img src="./assets/images/Logo.png" alt="">
        </div>

        <br><br>
        <br><br>

        <div class="login_box">
            <h1>Sign Up</h1>
            <p>Please enter your details to sign up</p>
            <div class="inpbox">
                <div class="box">
                    <label>Full Name</label>
                    <input type="text" class="fullname">
                    <img src="./assets/icons/user.svg" alt="">
                </div>

                <div class="box">
                    <label>Username</label>
                    <input type="text" class="username">
                    <img src="./assets/icons/user.svg" alt="">
                </div>

                <div class="box">
                    <label>Emai Address</label>
                    <input type="email" class="email">
                    <img src="./assets/icons/mail.svg" alt="">
                </div>

                <div class="box-hp">
                    <label>Password</label>
                    <input type="password" class="password">
                    <img id="eyeslash" src="./assets/icons/eye-slash.svg" alt="">
                    <img id="eye" src="./assets/icons/eye.svg" alt="">
                </div>
            </div>

            <div class="chekdiv">
                <input type="checkbox"> Agree to
                <a href="">Terms & Privacy</a>
            </div>

            <button class="sign_btn">Sign Up</button>

            <h5>Already have an account? &nbsp; <a href="./index.html">Sign In</a></h5>

            <div class="line">
                <hr>
                <span>OR</span>
                <hr>
            </div>

            <div class="btn_box">
                <button class="feesbook">
                    <a href="https://www.facebook.com/">
                        <img src="./assets/icons/feesbook.svg" alt="">
                    </a>
                </button>
                <button class="google">
                    <a href="https://www.google.com/">
                        <img src="./assets/icons/Google Logo.svg" alt="">
                    </a>
                </button>
                <button class="apple">
                    <a href="https://www.apple.com/uz/iphone/">
                        <img src="./assets/icons/apple.svg" alt="">
                    </a>
                </button>
            </div>
        </div>
        <p>Copyright @2026 - SmartHR</p>
    </div>


    <script src="./js/register.js"></script>
</body>

</html>
