<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link rel="stylesheet" href="./css/navbar.css">
    <link rel="stylesheet" href="./css/contact.css">
    <link rel="stylesheet" href="./fonts/font.css">
</head>

<body>
    <header>
        <div class="right">
            <div class="inputBox">
                <img src="./assets/icons/search (1).svg" alt="">
                <input type="text" placeholder="Search in HRMS">
            </div>
        </div>
        <div class="left">
            <div class="icons">
                <img src="./assets/icons/Chat.svg" alt="">
                <img src="./assets/icons/Inbox.svg" alt="">
                <img src="./assets/icons/Notification.svg" alt="">
                <img src="./assets/icons/Avatar With Dot Badges.svg" alt="">
            </div>
        </div>
    </header>
    <nav>
        <img src="./assets/icons/Logo (1).svg" alt="">

        <div class="main_menu">
            <p>MAIN MENU</p>

            <ul>
                <li>
                    <a href="./dashboard.html">
                        <img src="./assets/icons/dashboard (2).svg" alt="">
                        <span>Dashboard</span>
                        <img src="./assets/icons/chevron-down.svg" alt="">
                    </a>
                </li>
                <li class="active">
                    <a href="./contact.html">
                        <img src="./assets/icons/contacts.svg" alt="">
                        <span>Contacts</span>
                        <img src="./assets/icons/chevron-down.svg" alt="">
                    </a>
                </li>
                <li>
                    <a href="./superadmin.html">
                        <img src="./assets/icons/superadmin.svg" alt="">
                        <span>Super Admin</span>
                        <img src="./assets/icons/chevron-down.svg" alt="">
                    </a>
                </li>
            </ul>
        </div>
    </nav>

    <main>
        <div class="titlewrapper">
            <h2>Contacts</h2>
            <button><img src="./assets/icons/circle-plus.svg" alt="">Add New Contact</button>
        </div>

        <div class="contactControl">
            <h5>Contact Grid</h5>
            <select name="" id="">
                <option value="">Sort By : Last 7 Days</option>
            </select>

        </div>

        <div class="cardWrapper">
            <div class="card">
                <div class="avatar">
                    <input class="check" type="checkbox">
                    <div class="user">
                        <img src="./assets/icons/Card Avatar.svg" alt="">
                        <h5>Darlee Robertson</h5>
                        <p>Facility Manager</p>
                    </div>
                    <img src="./assets/icons/Action.svg" alt="">
                </div>

                <div class="address">
                    <p><img src="./assets/icons/mail-forward.svg" alt="">darlee@example.com</p>
                    <p><img src="./assets/icons/phone.svg" alt="">(163) 2459 315</p>
                    <p><img src="./assets/icons/map-pin.svg" alt="">Germany</p>
                </div>

                <hr>

                <div class="icons">
                    <div class="imags">
                        <img src="./assets/icons/mail-icon.svg" alt="">
                        <img src="./assets/icons/phone-call.svg" alt="">
                        <img src="./assets/icons/message-2.svg" alt="">
                        <img src="./assets/icons/brand-skype.svg" alt="">
                        <img src="./assets/icons/brand-facebook.svg" alt="">
                    </div>
                    <div class="reyting">
                        ⭐<p>4.2</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer-1">
        <div class="icons">
            <img src="./assets/icons/Inbox (1).svg" alt="">
            <img src="./assets/icons/Inbox (2).svg" alt="">
            <img src="assets/icons/Applications.svg" alt="">
        </div>
    </footer>
    <footer class="footer-2">
        <p>2026-2030 &copy; SmartHR.</p>
        <p>Designed & Developed By <span>Dreams</span></p>
    </footer>
</body>

</html>
