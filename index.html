<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./css/login.css">
</head>

<body>
    <div class="content">
        <div class="container">
            <img class="ellips" src="./assets/icons/Ellipse 8.svg" alt="">
            <h1>
                Empowering people <br>
                through seamless HR <br>
                management.
            </h1>

            <img src="./assets/images/photo.png" alt="">


            <p>Efficiently manage your workforce, streamline <br>
                operations effortlessly.</p>
        </div>
        <img class="ellipse" src="./assets/icons/Ellipse 9.svg" alt="">
        <img src="./assets/icons/Squiggly.svg" alt="">
    </div>

    <div class="box">
        <form>
            <img src="./assets/icons/Logo.svg" alt="">

            <h1>Sing in</h1>
            <p>Please enter your details to sign in</p>

            <div class="inpBox">
                <label>Username</label>
                <input type="text" name="text">
                <img class="user" src="./assets/icons/user.svg" alt="" width="16px">
            </div>

            <div class="inpBox">
                <label>Password</label>
                <input class="password_inp" type="password" name="password">
                <img class="eye" src="./assets/icons/eye.svg" alt="" width="16px">
                <img class="eye-slash" src="./assets/icons/eye-slash.svg" alt="" width="16px">
            </div>

            <div class="checkBox">
                <input id="chek" type="checkbox">
                <label class="label" for="chek">Remember me</label>
            </div>

            <button>Sing In</button>

            <span class="don">Don’t have an account? <a href="./register.html">Create Account</a> </span>


            <div class="wrap">
                <div class="con">
                    <img src="./assets/icons/Facebook Logo.svg " alt="">
                </div>
                <div class="con">
                    <img src="./assets/icons/Google Logo.svg" alt="">
                </div>
                <div class="con">
                    <img src="./assets/icons/Apple logo.svg" alt="">
                </div>
            </div>
        </form>

        <p>Copyright @2026 - SmartHR</p>
        
    </div>
    <script src="./js/login.js"></script>
</body>

</html>
